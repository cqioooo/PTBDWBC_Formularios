    <h2>Inscreva-se</h2>

    <form>
            <div style="margin-bottom: 15px;">
                <label for="evento">Evento</label>
                <select id="evento" name="evento">
                    <option value="voe-sem-asas">Voe sem asas</option>
                </select>
            </div>

            <fieldset style="border: 1px solid #ccc; margin-bottom: 15px; padding: 10px;">
                <legend>Informações de Acesso</legend>
                
                <div style="margin-bottom: 10px;">
                    <label style="display: inline-block; width: 120px;">Usuário</label>
                    <input type="text" name="usuario">
                </div>

                <div style="margin-bottom: 10px;">
                    <label style="display: inline-block; width: 120px;">Senha</label>
                    <input type="password" name="senha">
                </div>

                <div style="margin-bottom: 10px;">
                    <label style="display: inline-block; width: 120px;">Confirme a Senha</label>
                    <input type="password" name="confirma_senha">
                </div>
            </fieldset>

            <fieldset style="border: 1px solid #ccc; padding: 10px;">
                <legend>Informações Pessoais</legend>

                <div style="margin-bottom: 10px;">
                    <label style="display: inline-block; width: 120px;">Nome Completo</label>
                    <input type="text" name="nome" style="width: 250px;">
                </div>

                <div style="margin-bottom: 10px;">
                    <label style="display: inline-block; width: 120px;">E-mail</label>
                    <input type="email" name="email" style="width: 200px;">
                </div>

                <div style="margin-bottom: 10px;">
                    <label style="display: inline-block; width: 120px;">Celular</label>
                    <input type="tel" name="celular"> 
                    <span style="font-size: 12px; color: #666;">(99) 99999-9999</span>
                </div>
                <fieldset>
                    <legend>Sexo</legend>
                    <div style="margin-bottom: 10px;">
                        <input type="tel" name="celular"> 
                        <span style="font-size: 12px; color: #666;">(99) 99999-9999</span>
                    </div>
                </fieldset>

                <div style="margin-bottom: 10px;">
                    <label style="display: inline-block; width: 120px;">Data de nascimento</label>
                    <input type="date" name="data"> 
                </div>

                <div style="margin-bottom: 10px;">
                    <label style="display: inline-block; width: 120px;">Cor favorita</label>
                    <input type="color" name="cor"> 
                </div>

                <div style="margin-bottom: 10px;">
                    <label style="display: inline-block; width: 120px;">Perfil no Github</label>
                    <input type="text" name="perfil"> 
                </div>
            </fieldset>
            <input type="submit" name="Inscrever">
        </form>
    </main>
